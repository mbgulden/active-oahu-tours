name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build Astro Site
    runs-on: ubuntu-latest

    steps:
      - name: ✅ Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔨 Build
        run: npm run build
        env:
          NODE_ENV: production
          PUBLIC_SITE_URL: ${{ vars.PUBLIC_SITE_URL || 'https://activeoahutours.com' }}

      - name: 📤 Upload build artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  # ── Optional: Deploy via Wrangler CLI ──────────────────
