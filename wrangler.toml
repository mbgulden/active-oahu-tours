# Cloudflare Pages Configuration — Active Oahu Tours
# =====================================================
# Docs: https://developers.cloudflare.com/pages/platform/wrangler/
#
# This wrangler.toml is for Cloudflare Pages deployment.
# The GitHub integration auto-deploys on push; this file is
# used by wrangler CLI for manual deploys and local preview.

name = "active-oahu-tours"
compatibility_date = "2026-05-29"
pages_build_output_dir = "dist"

# ── Build Configuration ─────────────────────────────────
# Cloudflare Pages auto-detects build settings. Override here:
#
#   Build command:  npm run build
#   Output dir:     dist/
#   Node version:   20+
#   Framework:      Astro (auto-detected)

# ── Environment Variables ───────────────────────────────
# Set these in Cloudflare Dashboard > Pages > Settings > Environment
# or via: wrangler pages project create
#
# [vars]
# PUBLIC_SITE_URL = "https://activeoahutours.com"
# PUBLIC_GA_ID = "G-XXXXXXXXXX"                  # Google Analytics 4
# PUBLIC_FAREHARBOR_SHORTNAME = "activeoahu"      # FareHarbor booking
# PUBLIC_WEBFLOW_SITE_ID = ""                     # Only if Weglot stays
#
# [env.production]
# vars = { DEPLOY_ENV = "production" }
#
# [env.preview]
# vars = { DEPLOY_ENV = "preview" }

# ── Domain Configuration ────────────────────────────────
# Custom domain: activeoahutours.com
# Set in: Cloudflare Dashboard > Pages > active-oahu-tours > Custom Domains
#
# Primary:     activeoahutours.com
# Redirect:    www.activeoahutours.com → activeoahutours.com
#
# Preview deployments get auto-generated URLs:
#   {branch}.active-oahu-tours.pages.dev

# ── Branch Deploy Rules ─────────────────────────────────
# Set in: Cloudflare Dashboard > Pages > Settings > Builds & Deployments
#
# Production branch:  main  → deploys to activeoahutours.com
# Preview branch:     *     → deploys to {branch}.active-oahu-tours.pages.dev
#
# Staging (optional): staging → staging.activeoahutours.com
#   (requires DNS: CNAME staging → active-oahu-tours.pages.dev)

# ── Headers & Redirects ──────────────────────────────────
# Cloudflare Pages picks up _headers and _redirects from dist/
# Create these in your Astro public/ directory:
#
# public/_headers:
#   /*
#     X-Frame-Options: DENY
#     X-Content-Type-Options: nosniff
#     Referrer-Policy: strict-origin-when-cross-origin
#   /_astro/*
#     Cache-Control: public, max-age=31536000, immutable
#   /images/*
#     Cache-Control: public, max-age=604800
#
# public/_redirects:
#   /tours              /#tours           301
#   /book               https://fareharbor.com/embeds/book/activeoahu/  301
#   /kayak-mokulua      /#tours           301
#   /kayak-kaneohe      /#tours           301
#   /ebike-kailua       /#tours           301
#   /www/*              https://activeoahutours.com/:splat  301
